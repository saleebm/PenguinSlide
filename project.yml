name: PenguinSlide

options:
  bundleIdPrefix: dev.copt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: L7U86T3YRV
    CODE_SIGN_STYLE: Automatic

targets:
  PenguinSlide:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PenguinSlide
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.copt.PenguinSlide
        PRODUCT_NAME: PenguinSlide
        INFOPLIST_FILE: PenguinSlide/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""

  PenguinSlideUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PenguinSlideUITests
    dependencies:
      - target: PenguinSlide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.copt.PenguinSlideUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PenguinSlide

schemes:
  PenguinSlide:
    build:
      targets:
        PenguinSlide: all
        PenguinSlideUITests: [test]
    test:
      targets:
        - PenguinSlideUITests
      gatherCoverageData: false
